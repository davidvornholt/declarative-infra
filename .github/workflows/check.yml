name: Check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  nix:
    name: Nix flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Flake check
        run: nix flake check

  opentofu:
    name: OpenTofu validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [cloudflare-dns, cloudflare-r2]
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v2

      - name: Format
        run: tofu fmt -check -recursive "opentofu/${{ matrix.module }}"

      - name: Validate
        working-directory: opentofu/${{ matrix.module }}
        run: |
          tofu init -input=false -backend=false
          tofu validate -no-color
